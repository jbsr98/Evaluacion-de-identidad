<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Assessment Questionnaire</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        .question {
            margin: 15px 0;
        }
        button {
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Identity Assessment Questionnaire</h1>
    <form id="questionnaire">
        <div class="question">
            <label for="q1">1. What is your name?</label>
            <input type="text" id="q1" name="q1" required>
        </div>
        <div class="question">
            <label for="q2">2. What is your age?</label>
            <input type="number" id="q2" name="q2" required>
        </div>
        <div class="question">
            <label for="q3">3. What is your gender?</label>
            <input type="text" id="q3" name="q3" required>
        </div>
        <div class="question">
            <label for="q4">4. Where are you from?</label>
            <input type="text" id="q4" name="q4" required>
        </div>
        <div class="question">
            <label for="q5">5. What are your hobbies?</label>
            <input type="text" id="q5" name="q5" required>
        </div>
        <div class="question">
            <label for="q6">6. Describe your personality.</label>
            <input type="text" id="q6" name="q6" required>
        </div>
        <div class="question">
            <label for="q7">7. What do you value in life?</label>
            <input type="text" id="q7" name="q7" required>
        </div>
        <div class="question">
            <label for="q8">8. What is your occupation?</label>
            <input type="text" id="q8" name="q8" required>
        </div>
        <div class="question">
            <label for="q9">9. What is your dream job?</label>
            <input type="text" id="q9" name="q9" required>
        </div>
        <div class="question">
            <label for="q10">10. What languages do you speak?</label>
            <input type="text" id="q10" name="q10" required>
        </div>
        <div class="question">
            <label for="q11">11. What is your favorite book?</label>
            <input type="text" id="q11" name="q11" required>
        </div>
        <div class="question">
            <label for="q12">12. Describe your relationships.</label>
            <input type="text" id="q12" name="q12" required>
        </div>
        <div class="question">
            <label for="q13">13. What is your biggest fear?</label>
            <input type="text" id="q13" name="q13" required>
        </div>
        <div class="question">
            <label for="q14">14. What inspires you?</label>
            <input type="text" id="q14" name="q14" required>
        </div>
        <button type="button" onclick="submitForm()">Submit</button>
    </form>
</div>

<script>
    function submitForm() {
        const form = document.getElementById('questionnaire');
        const data = new FormData(form);
        const values = {};
        data.forEach((value, key) => {
            values[key] = value;
        });
        console.log(values); // Here you may handle the form data, e.g., send it to a server.
        alert('Thank you for completing the questionnaire!');
    }
</script>

</body>
</html>
